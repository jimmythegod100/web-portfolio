services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8001}:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  # Optional database: docker compose --profile db up
  db:
    image: postgres:16-alpine
    profiles: ["db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-client}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-client_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-client}
    volumes:
      - client_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  client_pgdata:
