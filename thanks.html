<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Message Sent — Vincent Martinez</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0c0f14; --text: #e8eaef; --muted: #8b93a7; --accent: #f97316; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-family: Fraunces, Georgia, serif; font-size: clamp(2rem, 5vw, 2.75rem); margin-bottom: 1rem; }
    p { color: var(--muted); max-width: 420px; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: var(--accent);
      color: #0c0f14;
      font-weight: 700;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Thanks — I got your message.</h1>
    <p>I'll review your project details and reply within 24 hours at the email you provided. Talk soon.</p>
    <a href="index.html">Back to portfolio</a>
  </main>
</body>
</html>
